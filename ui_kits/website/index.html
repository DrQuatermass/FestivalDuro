<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Duro — UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    body { background: var(--duro-yellow); }
    * { box-sizing: border-box; }
    img { max-width: 100%; height: auto; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Pages.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    function App() {
      const [page, setPage] = useState(() => localStorage.getItem("fd-page") || "home");
      const [band, setBand] = useState(null);
      useEffect(() => { localStorage.setItem("fd-page", page); }, [page]);
      const onNav = (p) => { setPage(p); setBand(null); window.scrollTo(0, 0); };
      const onOpenBand = (b) => { setBand(b); setPage("band"); window.scrollTo(0, 0); };
      return (
        <div>
          <SiteHeader current={page === "band" ? "lineup" : page} onNav={onNav}/>
          <main>
            {page === "home" && <HomePage onNav={onNav} onOpenBand={onOpenBand}/>}
            {page === "lineup" && <LineupPage onOpenBand={onOpenBand}/>}
            {page === "info" && <InfoPage/>}
            {page === "band" && band && <BandDetailPage band={band} onBack={() => onNav("lineup")}/>}
          </main>
          <SiteFooter/>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
