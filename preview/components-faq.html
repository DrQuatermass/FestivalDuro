<!DOCTYPE html><html lang="it"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.faq{border-top:2px solid var(--duro-black);padding:12px 0}
.faq:last-child{border-bottom:2px solid var(--duro-black)}
.faq summary{cursor:pointer;font-family:var(--font-display);text-transform:uppercase;font-size:14px;letter-spacing:.06em;list-style:none;display:flex;justify-content:space-between;align-items:center}
.faq summary::after{content:"+";font-size:20px}
.faq[open] summary::after{content:"−"}
.faq p{margin:8px 0 0;font-size:13px;line-height:1.5}
</style></head><body><div class="card" style="background:var(--duro-black);color:var(--duro-bone)">
  <details class="faq" open><summary style="color:var(--duro-yellow)">A che ora si inizia?</summary><p>I cancelli aprono alle 19:00. Primo live alle 20:30.</p></details>
  <details class="faq"><summary style="color:var(--duro-yellow)">Come arrivo all'Arena?</summary><p>Via Ancona 6, Modena — bus 7 dalla stazione.</p></details>
  <details class="faq"><summary style="color:var(--duro-yellow)">Serve il biglietto?</summary><p>Sì, disponibile sul nostro canale ufficiale.</p></details>
</div></body></html>
