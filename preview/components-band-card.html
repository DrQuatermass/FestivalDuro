<!DOCTYPE html><html lang="it"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.bc{background:var(--duro-bone);border:4px solid var(--duro-black);width:300px;position:relative;display:flex;flex-direction:column}
.bc__img{aspect-ratio:16/11;background:#222 url('../assets/poster-duro-4th-post.png') center/cover;border-bottom:4px solid var(--duro-black)}
.bc__body{padding:14px}
.bc__name{font-family:var(--font-display);font-size:18px;text-transform:uppercase;margin:0 0 6px}
.bc__meta{color:var(--duro-grey);font-size:11px;font-weight:700;text-transform:uppercase;margin:0}
.bc__tag{position:absolute;top:8px;right:8px;background:var(--duro-yellow);color:var(--duro-black);font-family:var(--font-display);font-size:10px;letter-spacing:.08em;padding:4px 8px;text-transform:uppercase;border:2px solid var(--duro-black)}
</style></head><body><div class="card" style="background:var(--duro-black)">
  <div class="row" style="gap:16px">
    <div class="bc">
      <span class="bc__tag">Headliner</span>
      <div class="bc__img"></div>
      <div class="bc__body"><h3 class="bc__name">I Duri del Rock</h3><p class="bc__meta">Sabato 6 giugno · 22:30</p></div>
    </div>
    <div class="bc">
      <div class="bc__img" style="background:#111 url('../assets/poster-copertina-fb.png') center/cover"></div>
      <div class="bc__body"><h3 class="bc__name">Volumi Proibiti</h3><p class="bc__meta">Venerdì 5 giugno · 21:00</p></div>
    </div>
  </div>
</div></body></html>
