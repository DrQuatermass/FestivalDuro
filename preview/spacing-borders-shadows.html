<!DOCTYPE html><html lang="it"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.box{display:flex;align-items:center;justify-content:center;background:#fff;border:3px solid var(--duro-black);font-family:ui-monospace,monospace;font-size:11px;color:var(--duro-black)}
.shad{background:#fff;border:4px solid var(--duro-black);padding:14px;font-family:var(--font-display);text-transform:uppercase;font-size:13px;letter-spacing:.08em}
</style></head><body><div class="card">
  <div class="tick tick--muted">Border widths</div>
  <div class="row" style="gap:14px">
    <div class="box" style="width:90px;height:56px;border-width:2px">2px</div>
    <div class="box" style="width:90px;height:56px;border-width:3px">3px</div>
    <div class="box" style="width:90px;height:56px;border-width:4px">4px</div>
    <div class="box" style="width:90px;height:56px;border-width:5px">5px</div>
  </div>
  <div class="tick tick--muted">Brutalist offset shadows (no blur)</div>
  <div class="row" style="gap:28px;padding:0 0 18px">
    <div class="shad" style="box-shadow:7px 7px 0 var(--duro-black)">7·7·0</div>
    <div class="shad" style="box-shadow:9px 9px 0 var(--duro-black)">9·9·0</div>
    <div class="shad" style="box-shadow:14px 14px 0 var(--duro-black)">14·14·0</div>
  </div>
</div></body></html>
