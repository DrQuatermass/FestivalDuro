<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="_card.css">
  <style>
    .card { padding: 0; min-height: 0; background: var(--duro-yellow); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
    }
    .tile {
      position: relative;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border-right: 3px solid var(--duro-black);
    }
    .tile:last-child { border-right: 0; }
    .tile__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .tile__label {
      position: absolute;
      left: 8px;
      bottom: 8px;
      padding: 4px 8px;
      background: var(--duro-black);
      color: var(--duro-yellow);
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid">
      <div class="tile">
        <img class="tile__img" src="../assets/hero-bg.jpg" alt="">
        <span class="tile__label">Hero bg · grunge</span>
      </div>
      <div class="tile">
        <img class="tile__img" src="../assets/poster-duro-4th-post.png" alt="">
        <span class="tile__label">Social post · 4:5</span>
      </div>
      <div class="tile">
        <img class="tile__img" src="../assets/locandina.png" alt="" style="object-position: center center;">
        <span class="tile__label">Locandina</span>
      </div>
    </div>
  </div>
</body>
</html>
