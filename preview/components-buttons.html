<!DOCTYPE html><html lang="it"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.btn{min-height:48px;display:inline-flex;align-items:center;justify-content:center;padding:.85rem 1.3rem;background:var(--duro-black);color:var(--duro-yellow);border:3px solid var(--duro-black);font-family:var(--font-display);font-size:13px;letter-spacing:.12em;text-transform:uppercase;transition:transform 180ms ease}
.btn:hover{transform:translateY(-2px)}
.btn--ghost{background:transparent;color:var(--duro-black)}
.btn--ghost:hover{background:var(--duro-black);color:var(--duro-yellow)}
.btn--inv{background:var(--duro-yellow);color:var(--duro-black);border-color:var(--duro-black)}
.btn--dark{background:var(--duro-black);color:var(--duro-yellow);border-color:var(--duro-yellow)}
</style></head><body><div class="card">
  <div class="row"><a class="btn">Vedi line-up</a><a class="btn btn--ghost">Biglietti</a></div>
  <div class="row" style="background:var(--duro-black);padding:12px;margin:0 -8px"><a class="btn btn--dark">Apri mappa</a><a class="btn btn--inv">Scopri di più</a></div>
  <div class="tick tick--muted">Primary · Ghost · Dark-surface · Inverse — hover: translateY(-2px)</div>
</div></body></html>
